server {
    listen 80;
    server_name _;
    # Le point d'entrée public est public/index.php.
    root /var/www/html/public;
    index index.php;

    charset utf-8;

    location / {
        # Toutes les URL propres (/login, /dashboard...) passent par le router PHP.
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        # "php" est le nom du service PHP-FPM dans docker-compose.yml.
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\. {
        # Bloque l'accès aux fichiers cachés comme .env ou .git.
        deny all;
    }
}
